openapi: 3.1.0
info:
  title: CardDemo Transaction API
  description: |
    Modernized transaction processing endpoints for the AWS CardDemo application.
    Converted from COBOL program COTRN00C (online transaction listing/processing).
  version: 0.1.0
  contact:
    name: ScaleFirst AI
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8090
    description: Local development server

paths:
  /api/v1/transactions:
    get:
      operationId: listTransactions
      summary: List transactions for a card
      description: |
        Retrieves a paginated list of transactions for a given card number.
        Original COBOL: COTRN00C.cbl — transaction listing with paging.
      tags:
        - Transactions
      parameters:
        - name: cardNumber
          in: query
          required: true
          schema:
            type: string
            maxLength: 16
          description: "Card number filter (COBOL: TRAN-CARD-NUM, PIC 9(16))"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
          description: Filter transactions from this date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
          description: Filter transactions to this date
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'
      security:
        - bearerAuth: []

    post:
      operationId: createTransaction
      summary: Create a new transaction
      description: |
        Processes a new credit card transaction.
        Original COBOL: COTRN00C.cbl — transaction entry and processing.
        Business rules: validates card status, credit limit, processes debits/credits.
      tags:
        - Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Validation error (invalid card, exceeded limit, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Transaction:
      type: object
      properties:
        transactionId:
          type: string
          description: "Transaction ID (COBOL: TRAN-ID, PIC X(16))"
        cardNumber:
          type: string
          description: "Card number (COBOL: TRAN-CARD-NUM, PIC 9(16))"
        transactionType:
          type: string
          enum: [PURCHASE, PAYMENT, CASH_ADVANCE, REFUND, FEE, INTEREST]
          description: "Transaction type code (COBOL: TRAN-TYPE-CD, PIC X(2))"
        transactionCategory:
          type: string
          description: "Category description (COBOL: TRAN-CAT-CD, PIC 9(4))"
        transactionSource:
          type: string
          description: "Source/merchant (COBOL: TRAN-SOURCE, PIC X(10))"
        amount:
          type: string
          description: "Transaction amount as decimal string (COBOL: TRAN-AMT, PIC S9(9)V99)"
        transactionDate:
          type: string
          format: date
          description: "Transaction date (COBOL: TRAN-ORIG-TS)"
        description:
          type: string
          description: "Transaction description (COBOL: TRAN-DESC, PIC X(100))"
        merchantName:
          type: string
          description: "Merchant name (COBOL: TRAN-MERCHANT-NAME, PIC X(50))"
        merchantCity:
          type: string
        merchantZip:
          type: string

    TransactionRequest:
      type: object
      required:
        - cardNumber
        - transactionType
        - amount
      properties:
        cardNumber:
          type: string
          maxLength: 16
        transactionType:
          type: string
          enum: [PURCHASE, PAYMENT, CASH_ADVANCE, REFUND]
        transactionCategory:
          type: string
        amount:
          type: string
          description: "Positive decimal amount (e.g., '150.00')"
        description:
          type: string
          maxLength: 100
        merchantName:
          type: string
          maxLength: 50
        merchantCity:
          type: string
          maxLength: 30
        merchantZip:
          type: string
          maxLength: 10

    TransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        page:
          type: integer
        totalPages:
          type: integer
        totalItems:
          type: integer
        totalAmount:
          type: string
          description: Sum of transaction amounts on this page

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
