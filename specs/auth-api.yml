openapi: 3.1.0
info:
  title: CardDemo Authentication API
  description: |
    Modernized authentication endpoint for the AWS CardDemo application.
    Converted from COBOL program COSGN00C (CICS online transaction).
  version: 0.1.0
  contact:
    name: ScaleFirst AI
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8090
    description: Local development server

paths:
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Authenticate user credentials
      description: |
        Validates user ID and password against the security file (USRSEC).
        Original COBOL: COSGN00C.cbl — PROCESS-ENTER-KEY paragraph.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - userId
        - password
      properties:
        userId:
          type: string
          maxLength: 8
          description: "User ID (COBOL: SEC-USR-ID, PIC X(8))"
          example: "USER0001"
        password:
          type: string
          maxLength: 8
          description: "Password (COBOL: SEC-USR-PWD, PIC X(8))"
          format: password

    LoginResponse:
      type: object
      properties:
        userId:
          type: string
          description: Authenticated user ID
        userType:
          type: string
          enum: [ADMIN, REGULAR]
          description: "User type (COBOL: SEC-USR-TYPE, PIC X(1))"
        firstName:
          type: string
          description: "User first name (COBOL: SEC-USR-FNAME, PIC X(20))"
        lastName:
          type: string
          description: "User last name (COBOL: SEC-USR-LNAME, PIC X(20))"
        token:
          type: string
          description: JWT authentication token

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        timestamp:
          type: string
          format: date-time
