name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java-build:
    name: Build & Test Java
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: output/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and test
        run: ./mvnw verify -B
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: output/java/target/surefire-reports/

  dashboard-build:
    name: Build Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  openapi-lint:
    name: Lint OpenAPI Specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx @stoplight/spectral-cli lint specs/*.yml --ruleset .spectral.yml
        continue-on-error: true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build dashboard image
        run: docker build -t evolutionai-dashboard ./dashboard
      - name: Build metrics exporter image
        run: docker build -t evolutionai-metrics ./metrics/metrics-exporter
