name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java-build:
    name: Build & Test Java
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: output/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and test
        run: ./mvnw verify -B
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: output/java/target/surefire-reports/

  dashboard-build:
    name: Build Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  openapi-lint:
    name: Lint OpenAPI Specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx @stoplight/spectral-cli lint specs/*.yml --ruleset .spectral.yml
        continue-on-error: true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build dashboard image
        run: docker build -t evolutionai-dashboard ./dashboard
      - name: Build metrics exporter image
        run: docker build -t evolutionai-metrics ./metrics/metrics-exporter

  coverage-enforcement:
    name: Coverage Enforcement
    runs-on: ubuntu-latest
    needs: java-build
    continue-on-error: true
    defaults:
      run:
        working-directory: output/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Run JaCoCo coverage verification
        run: ./mvnw verify -B -Djacoco.line.minimum=0.90 -Djacoco.branch.minimum=0.80
      - name: Check JaCoCo report exists and thresholds are met
        run: |
          if [ -f target/site/jacoco/jacoco.xml ]; then
            echo "JaCoCo report found."
          else
            echo "JaCoCo report not found at target/site/jacoco/jacoco.xml"
            exit 1
          fi
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: output/java/target/site/jacoco/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
        continue-on-error: true
      - name: Semgrep scan for Java security patterns
        uses: returntocorp/semgrep-action@v1
        with:
          config: 'p/java'
        continue-on-error: true

  skills-validation:
    name: Skills Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skill directory structure
        run: |
          EXIT_CODE=0
          for skill_dir in .claude/skills/*/; do
            skill_name=$(basename "$skill_dir")
            echo "Checking skill: $skill_name"
            if [ ! -f "${skill_dir}SKILL.md" ]; then
              echo "  ERROR: Missing SKILL.md in $skill_dir"
              EXIT_CODE=1
            fi
            if [ ! -d "${skill_dir}scripts" ]; then
              echo "  ERROR: Missing scripts/ directory in $skill_dir"
              EXIT_CODE=1
            fi
            if [ ! -d "${skill_dir}references" ]; then
              echo "  ERROR: Missing references/ directory in $skill_dir"
              EXIT_CODE=1
            fi
          done
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Skill validation failed."
            exit 1
          fi
          echo "All skills validated successfully."

  hook-linting:
    name: Hook Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on hook and skill scripts
        run: shellcheck .claude/hooks/*.sh .claude/skills/*/scripts/*.sh
