services:
  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - DATA_MODE=sample
    depends_on:
      - prometheus

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3100
      - NEXTAUTH_SECRET=evolution-ai-demo-secret
      - SALT=evolution-ai-demo-salt
    depends_on:
      langfuse-db:
        condition: service_healthy

  langfuse-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - langfuse-data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./metrics/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./metrics/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./metrics/grafana/dashboards:/etc/grafana/provisioning/dashboards

  metrics-exporter:
    build: ./metrics/metrics-exporter
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output:ro
      - ./source:/app/source:ro

volumes:
  langfuse-data:
