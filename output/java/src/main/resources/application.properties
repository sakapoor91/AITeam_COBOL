# CardDemo Modernized - Application Configuration
# Migrated from AWS CardDemo COBOL/CICS application

# HTTP Server
quarkus.http.port=8090

# PostgreSQL Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=carddemo
quarkus.datasource.password=carddemo
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/carddemo

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=CardDemo Modernized API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.smallrye-openapi.info-description=Modernized AWS CardDemo credit card management system
quarkus.swagger-ui.always-include=true

# Health Check
quarkus.health.extensions.enabled=true
